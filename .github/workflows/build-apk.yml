name: Build & Sign Release APK

on:
  push:
    branches: [main]
    paths:
      - 'duoshield_app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      # ── 4. NDK (required by sqflite_sqlcipher & flutter_webrtc) ──────────
      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" 2>/dev/null \
          || echo "NDK already present or skipped"

      # ── 5. Firebase config (env-var approach — safe for all JSON chars) ───
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" \
            > duoshield_app/android/app/google-services.json

      # ── 6. Keystore (env-var approach — safe for binary/base64 data) ──────
      - name: Decode & place keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" \
            | base64 --decode \
            > duoshield_app/android/app/duoshield-release.keystore

      # ── 7. Dependencies ───────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: duoshield_app
        run: flutter pub get

      # ── 8. Build ──────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: duoshield_app
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --verbose

      # ── 9. Rename with version + date ─────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' duoshield_app/pubspec.yaml \
            | awk '{print $2}' | tr '+' '-')
          DATE=$(date +'%Y%m%d')
          mv duoshield_app/build/app/outputs/flutter-apk/app-release.apk \
             "duoshield_app/build/app/outputs/flutter-apk/duoshield-${VERSION}-${DATE}.apk"
          echo "APK: duoshield-${VERSION}-${DATE}.apk"

      # ── 10. Upload artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duoshield-release-apk
          path: duoshield_app/build/app/outputs/flutter-apk/duoshield-*.apk
          retention-days: 30
