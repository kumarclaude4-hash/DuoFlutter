name: Build & Sign Release APK

on:
  push:
    branches: [main]
    paths:
      - 'duoshield_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      # ── 4. NDK (required by sqflite_sqlcipher & flutter_webrtc) ──────────
      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" 2>/dev/null \
          || echo "NDK already present or skipped"

      # ── 5. Firebase config ────────────────────────────────────────────────
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" \
            > duoshield_app/android/app/google-services.json

      # ── 6. Keystore + key.properties setup ───────────────────────────────
      # Writes duoshield_app/android/key.properties which Gradle reads directly.
      # Uses provided secrets when the alias is verified; falls back to a fresh
      # CI keystore otherwise.  key.properties is never committed (.gitignore).
      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          SECRET_STORE_PASS:  ${{ secrets.KEY_STORE_PASSWORD }}
          SECRET_KEY_ALIAS:   ${{ secrets.KEY_ALIAS }}
          SECRET_KEY_PASS:    ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KS_PATH="duoshield_app/android/app/duoshield-release.keystore"
          KEY_PROPS="duoshield_app/android/key.properties"

          USE_PROVIDED=false

          if [ -n "${KEYSTORE_BASE64:-}" ] && \
             [ -n "${SECRET_STORE_PASS:-}" ] && \
             [ -n "${SECRET_KEY_ALIAS:-}" ]; then

            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KS_PATH"
            LOWER_ALIAS=$(echo "$SECRET_KEY_ALIAS" | tr '[:upper:]' '[:lower:]')

            # Check the alias exists (keytool exits 0 = found, 1 = not found)
            if keytool -list \
                  -keystore "$KS_PATH" \
                  -storepass "$SECRET_STORE_PASS" \
                  -alias "$LOWER_ALIAS" 2>/dev/null; then
              echo "Provided keystore valid — alias '$LOWER_ALIAS' found."
              USE_PROVIDED=true
              FINAL_STORE_PASS="$SECRET_STORE_PASS"
              FINAL_KEY_ALIAS="$LOWER_ALIAS"
              FINAL_KEY_PASS="${SECRET_KEY_PASS:-$SECRET_STORE_PASS}"
            else
              echo "Alias '$LOWER_ALIAS' not found in provided keystore — generating CI keystore."
              rm -f "$KS_PATH"
            fi
          else
            echo "Signing secrets not fully set — generating CI keystore."
          fi

          if [ "$USE_PROVIDED" = "false" ]; then
            FINAL_STORE_PASS="ci_store_duoshield"
            FINAL_KEY_ALIAS="duoshield"
            FINAL_KEY_PASS="ci_key_duoshield"
            keytool -genkey \
              -keystore "$KS_PATH" \
              -alias    "$FINAL_KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 3650 \
              -storepass "$FINAL_STORE_PASS" \
              -keypass   "$FINAL_KEY_PASS" \
              -dname "CN=DuoShield CI,OU=CI,O=DuoShield,L=Unknown,ST=Unknown,C=US" \
              -noprompt
            echo "CI keystore generated."
          fi

          # Write key.properties — Gradle reads this at build time directly
          printf 'storeFile=app/duoshield-release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$FINAL_STORE_PASS" "$FINAL_KEY_ALIAS" "$FINAL_KEY_PASS" \
            > "$KEY_PROPS"
          echo "key.properties written."

      # ── 7. Dependencies ───────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: duoshield_app
        run: flutter pub get

      # ── 8. Build ──────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: duoshield_app
        run: |
          flutter build apk --release 2>&1 | tee /tmp/flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "===== Build error summary ====="
            grep -E "error:|FAILED|> Task|what went wrong|Execution failed|^e: " \
              /tmp/flutter_build.log | tail -80 || true
            exit "$BUILD_EXIT"
          fi

      # ── 9. Rename with version + date ─────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' duoshield_app/pubspec.yaml \
            | awk '{print $2}' | tr '+' '-')
          DATE=$(date +'%Y%m%d')
          mv duoshield_app/build/app/outputs/flutter-apk/app-release.apk \
             "duoshield_app/build/app/outputs/flutter-apk/duoshield-${VERSION}-${DATE}.apk"
          echo "APK: duoshield-${VERSION}-${DATE}.apk"

      # ── 10. Upload artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duoshield-release-apk
          path: duoshield_app/build/app/outputs/flutter-apk/duoshield-*.apk
          retention-days: 30
