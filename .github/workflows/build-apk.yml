name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'duoshield_app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > duoshield_app/android/app/google-services.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: duoshield_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: duoshield_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duoshield-debug-apk
          path: duoshield_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
