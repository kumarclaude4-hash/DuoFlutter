name: Build & Sign Release APK

on:
  push:
    branches: [main]
    paths:
      - 'duoshield_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      # ── 4. NDK (required by sqflite_sqlcipher & flutter_webrtc) ──────────
      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" 2>/dev/null \
          || echo "NDK already present or skipped"

      # ── 5. Firebase config ────────────────────────────────────────────────
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" \
            > duoshield_app/android/app/google-services.json

      # ── 6. Keystore setup ─────────────────────────────────────────────────
      # Uses provided secrets when valid (alias verified); generates a fresh
      # CI keystore as a fallback.  Exports KEY_STORE_PASSWORD, KEY_ALIAS,
      # KEY_PASSWORD to GITHUB_ENV so subsequent steps inherit them directly
      # as real environment variables (not via ${{ env.* }} expression syntax,
      # which is evaluated at parse-time and cannot see runtime GITHUB_ENV).
      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64:     ${{ secrets.KEYSTORE_BASE64 }}
          SECRET_STORE_PASS:   ${{ secrets.KEY_STORE_PASSWORD }}
          SECRET_KEY_ALIAS:    ${{ secrets.KEY_ALIAS }}
          SECRET_KEY_PASS:     ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KS_PATH="duoshield_app/android/app/duoshield-release.keystore"

          USE_PROVIDED=false
          if [ -n "${KEYSTORE_BASE64:-}" ] && \
             [ -n "${SECRET_STORE_PASS:-}" ] && \
             [ -n "${SECRET_KEY_ALIAS:-}" ]; then

            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KS_PATH"
            LOWER_ALIAS=$(echo "$SECRET_KEY_ALIAS" | tr '[:upper:]' '[:lower:]')

            # Verify the alias actually exists (keytool exit 0 = found)
            if keytool -list \
                  -keystore "$KS_PATH" \
                  -storepass "$SECRET_STORE_PASS" \
                  -alias "$LOWER_ALIAS" 2>/dev/null; then
              echo "✅ Provided keystore valid — alias '$LOWER_ALIAS' found."
              USE_PROVIDED=true
              {
                echo "KEY_STORE_PASSWORD=$SECRET_STORE_PASS"
                echo "KEY_ALIAS=$LOWER_ALIAS"
                echo "KEY_PASSWORD=${SECRET_KEY_PASS:-$SECRET_STORE_PASS}"
              } >> "$GITHUB_ENV"
            else
              echo "⚠️  Alias '$LOWER_ALIAS' not in provided keystore — generating CI keystore."
              rm -f "$KS_PATH"
            fi
          else
            echo "ℹ️  Signing secrets not fully set — generating CI keystore."
          fi

          if [ "$USE_PROVIDED" = "false" ]; then
            CI_STORE_PASS="ci_store_duoshield"
            CI_KEY_ALIAS="duoshield"
            CI_KEY_PASS="ci_key_duoshield"
            keytool -genkey -v \
              -keystore "$KS_PATH" \
              -alias    "$CI_KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 3650 \
              -storepass "$CI_STORE_PASS" \
              -keypass   "$CI_KEY_PASS" \
              -dname "CN=DuoShield CI, OU=CI, O=DuoShield, L=Unknown, ST=Unknown, C=US" \
              -noprompt
            echo "✅ CI keystore generated."
            {
              echo "KEY_STORE_PASSWORD=$CI_STORE_PASS"
              echo "KEY_ALIAS=$CI_KEY_ALIAS"
              echo "KEY_PASSWORD=$CI_KEY_PASS"
            } >> "$GITHUB_ENV"
          fi

      # ── 7. Dependencies ───────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: duoshield_app
        run: flutter pub get

      # ── 8. Build ──────────────────────────────────────────────────────────
      # KEY_STORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD come from GITHUB_ENV
      # set by step 6 — they are real env vars, not ${{ }} expressions.
      - name: Build release APK
        working-directory: duoshield_app
        run: |
          flutter build apk --release 2>&1 | tee /tmp/flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "===== Build error summary ====="
            grep -E "error:|FAILED|> Task|what went wrong|Execution failed|^e: " \
              /tmp/flutter_build.log | tail -80 || true
            exit "$BUILD_EXIT"
          fi

      # ── 9. Rename with version + date ─────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' duoshield_app/pubspec.yaml \
            | awk '{print $2}' | tr '+' '-')
          DATE=$(date +'%Y%m%d')
          mv duoshield_app/build/app/outputs/flutter-apk/app-release.apk \
             "duoshield_app/build/app/outputs/flutter-apk/duoshield-${VERSION}-${DATE}.apk"
          echo "APK: duoshield-${VERSION}-${DATE}.apk"

      # ── 10. Upload artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duoshield-release-apk
          path: duoshield_app/build/app/outputs/flutter-apk/duoshield-*.apk
          retention-days: 30
