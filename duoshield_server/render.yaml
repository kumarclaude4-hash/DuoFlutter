services:
  - type: web
    name: duoshield-server
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CLOUDFLARE_TURN_API_TOKEN
        sync: false
      - key: CLOUDFLARE_TURN_KEY_ID
        sync: false
      - key: TURN_TTL
        value: "86400"
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      - key: B2_ENDPOINT
        sync: false
      - key: B2_PRESIGN_TTL
        value: "3600"
